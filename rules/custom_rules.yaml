# rules/custom_rules.yaml

custom_entries:
#右手がBSのストローク群
  - {left_stroke: 'S', right_stroke: 'BS', stem: 'kamosire', row: '', class: 'nai_adj', type: 'adj', allowed_kinds: ['shushi', 'masu', 'ta', 'mashita']} # かもしれない
 # - {left_stroke: '', right_stroke: 'BS', stem: 'haya', row: '', class: 'i_adj', type: 'adj'} # 早い
  - {left_stroke: '', right_stroke: 'BS', stem: '', row: '', class: 'nai_adj', type: 'adj'} # ない
  - {left_stroke: 'R', right_stroke: 'BS', stem: 'haike', row: '', class: 'nai_adj', type: 'adj', allowed_kinds: ['shushi', 'masu', 'ta', 'mashita']} # はいけない
  - {left_stroke: 'SK', right_stroke: 'BS', stem: 'hosi', row: '', class: 'i_adj', type: 'adj'} # ほしい
  - {left_stroke: 'KW', right_stroke: 'BS', stem: 'moi', row: '', class: 'i_adj', type: 'adj'} # もいい
  - {left_stroke: 'WR', right_stroke: 'BS', stem: 'rasi', row: '', class: 'i_adj', type: 'adj'} # らしい
  - {left_stroke: 'KWR', right_stroke: 'BS', stem: 'nitigai', row: '', class: 'nai_adj', type: 'adj', allowed_kinds: ['shushi', 'masu', 'ta', 'mashita']} # にちがいない

#右手で何も押さない
  - {left_stroke: 'R', right_stroke: '', stem: '', row: 'k', class: 'kahen', type: 'verb'} #k くる
  - {left_stroke: 'S', right_stroke: '', stem: 'sa', row: 's', class: 'shimo_ichidan', type: 'verb'} #s させる
  - {left_stroke: 'K', right_stroke: '', stem: 'ta', row: '', class: 'i_adj', type: 'adj'} #t たい
  - {left_stroke: 'W', right_stroke: '', stem: 'na', row: 'r', class: 'godan', type: 'verb'} #n なる
  #SK: {left_stroke: 'SK', right_stroke: '', stem: 'hazu', row: 'h', class: 'godan', type: 'verb'} #h
  - {left_stroke: 'KW', right_stroke: '', stem: 'omo', row: 'w', class: 'godan', type: 'verb'} #m 思う
  - {left_stroke: 'WR', right_stroke: '', stem: 'ra', row: 'r', class: 'shimo_ichidan', type: 'verb'} #r られる

# 右手が「する」と同じストローク群
  - {left_stroke: '', right_stroke: 'GS', stem: '', row: 's', class: 'sahen', type: 'verb'} #する
  - {left_stroke: 'R', right_stroke: 'GS', stem: 'i', row: 'k', class: 'godan', type: 'verb'} #いく
  - {left_stroke: 'S', right_stroke: 'GS', stem: 'sima', row: 'w', class: 'godan', type: 'verb'} #しまう
  - {left_stroke: 'K', right_stroke: 'GS', stem: 'tya', row: 'w', class: 'godan', type: 'verb'} #ちゃう
  - {left_stroke: 'W', right_stroke: 'GS', stem: 'o', row: 'k', class: 'godan', type: 'verb'} #おく
  - {left_stroke: 'KW', right_stroke: 'GS', stem: 'mora', row: 'w', class: 'godan', type: 'verb'} #もらう
  - {left_stroke: 'WR', right_stroke: 'GS', stem: 'ku', row: 'r', class: 'shimo_ichidan', type: 'verb'} #くれる
  - {left_stroke: 'KWR', right_stroke: 'GS', stem: 'a', row: 'g', class: 'shimo_ichidan', type: 'verb'} #あげる
  - {left_stroke: 'SKW', right_stroke: 'GS', stem: 'zya', row: 'w', class: 'godan', type: 'verb'} #じゃう

# 右手が五段動詞と同じストローク群
  - {left_stroke: '', right_stroke: 'BGS', stem: 'a', row: 'r', class: 'godan', type: 'verb'} #ある

# 右手が上一段と同じストローク群
  - {left_stroke: 'KR', right_stroke: 'RGS', stem: 'de', row: 'k', class: 'kami_ichidan', type: 'verb'} #できる

# 右手が'RS'のストローク群
  - {left_stroke: 'KW', right_stroke: 'RS', stem: 'itada', row: 'k', class: 'godan', type: 'verb'} #いただく
  - {left_stroke: 'WR', right_stroke: 'RS', stem: 'kudasa', row: 'r', class: 'godan', type: 'verb'} #くださる
  - {left_stroke: 'KWR', right_stroke: 'RS', stem: 'sasia', row: 'g', class: 'shimo_ichidan', type: 'verb'} #さしあげる
  - {left_stroke: 'SKR', right_stroke: 'RS', stem: 'ya', row: 'r', class: 'godan', type: 'verb'} #やる

